<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Nali 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1>Save Nali 💖</h1>
    <p class="subtitle">Help Marek collect hearts and reach Nali.</p>

    <canvas id="gameCanvas" width="900" height="450"></canvas>

    <div class="controls">
      <button id="startBtn">Start Game</button>
      <button id="restartBtn">Restart</button>
    </div>

    <p class="instructions">
      Use ← → to move, Space to jump. On phone, tap the buttons below.
    </p>

    <div class="mobile-controls">
      <button id="leftBtn">←</button>
      <button id="jumpBtn">Jump</button>
      <button id="rightBtn">→</button>
    </div>

    <div id="loveMessage"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
